services:
  # Ollama for LLM inference (Gemma 3 12B)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Whisper for audio transcription
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: whisper
    ports:
      - "9000:9000"
    environment:
      - ASR_MODEL=base
      - ASR_ENGINE=openai_whisper
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ChromaDB for vector storage
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Flask API Backend for RAG Agent
  flask-api:
    build:
      context: .
      dockerfile: Dockerfile.flask
    container_name: flask-api
    depends_on:
      ollama:
        condition: service_healthy
      whisper:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WHISPER_BASE_URL=http://whisper:9000
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - FLASK_ENV=production
      - OLLAMA_MODEL=kwangsuklee/gemma-3-12b-it-Q4_K_M:latest
      - OLLAMA_EMBEDDING_MODEL=nomic-embed-text
      - CHROMA_COLLECTION_NAME=rag_knowledge_base
      - CHUNK_SIZE=800
      - CHUNK_OVERLAP=150
    volumes:
      - ./data:/app/data
      - ./resources:/app/resources
      - ./src:/app/src
      - ./api:/app/api
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Open WebUI - Modern Chat Interface
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    depends_on:
      ollama:
        condition: service_healthy
      flask-api:
        condition: service_healthy
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=your-secret-key-change-this
      - ENABLE_RAG_WEB_SEARCH=false
      - OPENAI_API_BASE_URL=http://flask-api:5000/api # Point to your RAG API
      - OPENAI_API_KEY=dummy-key # Required but can be dummy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  ollama_data:
  chroma_data:
  open_webui_data:
